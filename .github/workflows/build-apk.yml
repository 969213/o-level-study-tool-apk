name: Compile APK and Deploy PWA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Install Android Build Tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Create Cordova App & Compile APK
        run: |
          cordova create my_app com.olevel.study OLevelApp
          rm -rf my_app/www/*
          cp index.html style.css app.js questions.json manifest.json sw.js icon-192.png icon-512.png my_app/www/
          cd my_app
          cordova platform add android@12.0.0
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: o_level_study_app_apk
          path: my_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk

  deploy-pwa:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
