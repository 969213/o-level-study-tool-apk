name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Create Cordova App & Compile APK
        run: |
          cordova create my_app com.olevel.study OLevelApp
          # Clean default Cordova files
          rm -rf my_app/www/*
          # Copy web app assets into Cordova www directory
          cp index.html style.css app.js questions.json manifest.json sw.js icon-192.png icon-512.png my_app/www/
          cd my_app
          # Add android platform
          cordova platform add android@12.0.0
          # Build APK
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: o_level_study_app_apk
          path: my_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
